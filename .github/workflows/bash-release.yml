name: Release

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: cocogitto/cocogitto-action@v4.2.0
        with:
          git-user: repokit
          git-user-email: repokit@djachenko
          command: bump
          args: --auto --disable-bump-commit

      - name: Resolve version
        id: version
        run: |
          VERSION=$(git tag --points-at HEAD | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "minor=$(echo "$VERSION" | cut -d. -f1,2)" >> $GITHUB_OUTPUT
          echo "major=$(echo "$VERSION" | cut -d. -f1)" >> $GITHUB_OUTPUT

      - name: Update wrapper templates
        if: steps.version.outputs.version != ''
        run: |
          MINOR_TAG=${{ steps.version.outputs.minor }}
          sed -i "s/@[0-9][0-9a-zA-Z._-]*/@$MINOR_TAG/g" languages/*/wrappers/*.yml .github/workflows/python-integration.yml
          git add languages/*/wrappers/*.yml .github/workflows/python-integration.yml
          if ! git diff --cached --quiet; then
            git commit -m "chore: release ${{ steps.version.outputs.version }} [no ci]" --author="repokit <repokit@djachenko>"
            git tag -f "${{ steps.version.outputs.version }}"
          fi
          git tag -f "$MINOR_TAG"
          git tag -f "${{ steps.version.outputs.major }}"

      - name: Create GitHub release
        if: steps.version.outputs.version != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git push origin HEAD:master
          git push origin "refs/tags/${{ steps.version.outputs.version }}"
          git push origin "refs/tags/${{ steps.version.outputs.minor }}" --force
          git push origin "refs/tags/${{ steps.version.outputs.major }}" --force
          cog changelog "${{ steps.version.outputs.version }}" > /tmp/changelog.md
          gh release create "${{ steps.version.outputs.version }}" --title "${{ steps.version.outputs.version }}" --notes-file /tmp/changelog.md || \
            gh release edit "${{ steps.version.outputs.version }}" --notes-file /tmp/changelog.md
