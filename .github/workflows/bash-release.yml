name: Release

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: cocogitto/cocogitto-action@v3
        with:
          git-user: repokit
          git-user-email: repokit@djachenko

      - name: Bump version
        run: cog bump --auto --disable-bump-commit

      - name: Update wrapper templates
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          sed -i "s/@[0-9][0-9a-zA-Z._-]*/@$VERSION/g" languages/*/wrappers/*.yml
          git add languages/*/wrappers/*.yml
          if ! git diff --cached --quiet; then
            git commit -m "chore: [repokit] bump wrappers to $VERSION" --author="repokit <repokit@djachenko>"
            git tag -f "$VERSION"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          git push origin "$VERSION"
          cog changelog "$VERSION" > /tmp/changelog.md
          gh release create "$VERSION" --title "$VERSION" --notes-file /tmp/changelog.md
