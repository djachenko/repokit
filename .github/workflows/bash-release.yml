name: Release

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: cocogitto/cocogitto-action@v4.2.0
        with:
          git-user: repokit
          git-user-email: repokit@djachenko
          command: bump
          args: --auto --disable-bump-commit

      - name: Bump version
        run: cog bump --auto --disable-bump-commit

      - name: Update wrapper templates
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          MINOR_TAG=$(echo "$VERSION" | cut -d. -f1,2)
          MAJOR_TAG=$(echo "$VERSION" | cut -d. -f1)
          sed -i "s/@[0-9][0-9a-zA-Z._-]*/@$MINOR_TAG/g" languages/*/wrappers/*.yml
          git add languages/*/wrappers/*.yml
          if ! git diff --cached --quiet; then
            git commit -m "chore: [repokit] bump wrappers to $MINOR_TAG" --author="repokit <repokit@djachenko>"
            git tag -f "$VERSION"
          fi
          git tag -f "$MINOR_TAG"
          git tag -f "$MAJOR_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          MINOR_TAG=$(echo "$VERSION" | cut -d. -f1,2)
          MAJOR_TAG=$(echo "$VERSION" | cut -d. -f1)
          git push origin HEAD:master
          git push origin "refs/tags/$VERSION"
          git push origin "refs/tags/$MINOR_TAG" --force
          git push origin "refs/tags/$MAJOR_TAG" --force
          cog changelog "$VERSION" > /tmp/changelog.md
          gh release create "$VERSION" --title "$VERSION" --notes-file /tmp/changelog.md
