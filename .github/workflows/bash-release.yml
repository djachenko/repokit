name: Release

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          now=$(date +%s)
          iat=$((now - 60))
          exp=$((now + 540))
          header=$(echo -n '{"alg":"RS256","typ":"JWT"}' | base64 -w0 | tr '+/' '-_' | tr -d '=')
          payload=$(echo -n "{\"iat\":${iat},\"exp\":${exp},\"iss\":${APP_ID}}" | base64 -w0 | tr '+/' '-_' | tr -d '=')
          sig=$(echo -n "${header}.${payload}" | openssl dgst -sha256 -sign <(echo "${APP_PRIVATE_KEY}") | base64 -w0 | tr '+/' '-_' | tr -d '=')
          jwt="${header}.${payload}.${sig}"
          installation_id=$(curl -s -H "Authorization: Bearer ${jwt}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/installation" | jq -r '.id')
          token=$(curl -s -X POST -H "Authorization: Bearer ${jwt}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/app/installations/${installation_id}/access_tokens" | jq -r '.token')
          echo "token=${token}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: cocogitto/cocogitto-action@v4
        with:
          git-user: repokit
          git-user-email: repokit@djachenko

      - name: Bump version
        run: cog bump --auto --disable-bump-commit

      - name: Update wrapper templates
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          MINOR_TAG=$(echo "$VERSION" | cut -d. -f1,2)
          MAJOR_TAG=$(echo "$VERSION" | cut -d. -f1)
          sed -i "s/@[0-9][0-9a-zA-Z._-]*/@$MINOR_TAG/g" languages/*/wrappers/*.yml
          git add languages/*/wrappers/*.yml
          if ! git diff --cached --quiet; then
            git commit -m "chore: [repokit] bump wrappers to $MINOR_TAG" --author="repokit <repokit@djachenko>"
            git tag -f "$VERSION"
          fi
          git tag -f "$MINOR_TAG"
          git tag -f "$MAJOR_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          MINOR_TAG=$(echo "$VERSION" | cut -d. -f1,2)
          MAJOR_TAG=$(echo "$VERSION" | cut -d. -f1)
          git push origin HEAD:master
          git push origin "refs/tags/$VERSION"
          git push origin "refs/tags/$MINOR_TAG" --force
          git push origin "refs/tags/$MAJOR_TAG" --force
          cog changelog "$VERSION" > /tmp/changelog.md
          gh release create "$VERSION" --title "$VERSION" --notes-file /tmp/changelog.md
