name: Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: sudo apt-get install -y shellcheck shfmt

      - name: shellcheck
        run: find . -name "*.sh" -o -name "repokit" | xargs shellcheck

      - name: shfmt
        run: find . -name "*.sh" | xargs shfmt -i 2 -sr -d
