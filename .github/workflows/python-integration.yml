name: Integration

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.x"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        shell: bash
        run: pytest || [ $? -eq 5 ]

  integration:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Merge master
        run: git merge origin/master --no-edit

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install ".[release]"

      - name: Configure git
        run: |
          git config user.name "repokit"
          git config user.email "repokit@djachenko"

      - name: Bump version (no commit)
        run: semantic-release version --no-commit --no-tag --no-push --no-changelog

      - name: Patch dev suffix
        run: |
          python -c "
          import tomllib, pathlib, os
          with open('pyproject.toml', 'rb') as f:
              v = tomllib.load(f)['project']['version']
          p = pathlib.Path('pyproject.toml')
          p.write_text(p.read_text().replace(f'version = \"{v}\"', f'version = \"{v}.dev{os.environ[\"GITHUB_RUN_NUMBER\"]}\"'))
          "

      - name: Build
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Smoke test
        run: |
          VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          pip install --index-url https://test.pypi.org/simple/ --no-deps ${{ inputs.package_name }}==$VERSION
          ${{ inputs.package_name }} --help
