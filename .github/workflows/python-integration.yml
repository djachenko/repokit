name: Integration

on:
  workflow_call:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - uses: djachenko/repokit/.github/actions/python-versions@0.6
        id: versions

  test:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        shell: bash
        run: pytest || [ $? -eq 5 ]

  integration:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "repokit"
          git config user.email "repokit@djachenko"

      - name: Merge master
        run: git merge origin/master --no-edit

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install ".[release]"

      - name: Bump version (no commit)
        run: semantic-release version --no-commit --no-tag --no-push --no-changelog

      - name: Patch dev suffix
        run: |
          python -c "
          import tomllib, pathlib, os
          with open('pyproject.toml', 'rb') as f:
              v = tomllib.load(f)['project']['version']
          p = pathlib.Path('pyproject.toml')
          p.write_text(p.read_text().replace(f'version = \"{v}\"', f'version = \"{v}.dev{os.environ[\"GITHUB_RUN_NUMBER\"]}\"'))
          "

      - name: Build
        run: python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
