name: Release

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install ".[release]"

      - name: Configure git
        run: |
          git config user.name "semantic-release"
          git config user.email "semantic-release@users.noreply.github.com"

      - name: Run semantic release
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          semantic-release version
          AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=${AFTER#v}" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.release.outputs.released == 'true'
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.release.outputs.released == 'true'

      - name: Smoke test (PyPI)
        if: steps.release.outputs.released == 'true'
        run: |
          VERSION=${{ steps.release.outputs.version }}

          for i in {1..5}; do
            pip install ${{ inputs.package_name }}==$VERSION && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          ${{ inputs.package_name }} --help
