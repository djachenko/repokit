name: Release

on:
  workflow_call:
    outputs:
      released:
        description: "Whether a new version was released"
        value: ${{ jobs.release.outputs.released }}

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install ".[release]"

      - name: Configure git
        run: |
          git config user.name "semantic-release"
          git config user.email "semantic-release@users.noreply.github.com"

      - name: Run semantic release
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          semantic-release version
          AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=${AFTER#v}" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.release.outputs.released == 'true'
        run: python -m build

      - name: Upload dist
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
