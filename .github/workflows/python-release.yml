name: Release

on:
  workflow_call:
    outputs:
      released:
        description: "Whether a new version was released"
        value: ${{ jobs.release.outputs.released }}

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          now=$(date +%s)
          iat=$((now - 60))
          exp=$((now + 540))
          header=$(echo -n '{"alg":"RS256","typ":"JWT"}' | base64 -w0 | tr '+/' '-_' | tr -d '=')
          payload=$(echo -n "{\"iat\":${iat},\"exp\":${exp},\"iss\":${APP_ID}}" | base64 -w0 | tr '+/' '-_' | tr -d '=')
          sig=$(echo -n "${header}.${payload}" | openssl dgst -sha256 -sign <(echo "${APP_PRIVATE_KEY}") | base64 -w0 | tr '+/' '-_' | tr -d '=')
          jwt="${header}.${payload}.${sig}"
          installation_id=$(curl -s -H "Authorization: Bearer ${jwt}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/installation" | jq -r '.id')
          token=$(curl -s -X POST -H "Authorization: Bearer ${jwt}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/app/installations/${installation_id}/access_tokens" | jq -r '.token')
          echo "token=${token}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install ".[release]"

      - name: Configure git
        run: |
          git config user.name "semantic-release"
          git config user.email "semantic-release@users.noreply.github.com"

      - name: Run semantic release
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          semantic-release version
          AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=${AFTER#v}" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.release.outputs.released == 'true'
        run: python -m build

      - name: Upload dist
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
